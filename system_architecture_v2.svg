<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">本地 Agent 智能体实训系统架构图 V2</title>
  <desc id="desc">深色科技蓝图风格的系统架构图，展示用户、React、FastAPI、B1 到 B5 模块、模型服务、SQLite、工具与运行产物之间的数据流和成员分工。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0a1526"/>
      <stop offset="1" stop-color="#10182b"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#8aa4c7" stroke-opacity="0.075" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.5" fill="#9eb7d8" fill-opacity="0.13"/>
    </pattern>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000814" flood-opacity="0.52"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#93a4bd"/>
    </marker>
    <marker id="arrowViolet" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#c4b5fd"/>
    </marker>
    <style>
      .font { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
      .title { font-size: 42px; font-weight: 750; fill: #f7fbff; letter-spacing: 1px; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #8fa4c1; letter-spacing: 2.2px; }
      .band { font-size: 14px; font-weight: 700; fill: #68809f; letter-spacing: 2px; }
      .module-id { font-size: 13px; font-weight: 800; letter-spacing: 1.8px; }
      .module-title { font-size: 24px; font-weight: 750; fill: #f8fbff; }
      .module-copy { font-size: 15px; font-weight: 500; fill: #b8c6d9; }
      .member { font-size: 14px; font-weight: 700; fill: #f7fbff; }
      .small-title { font-size: 18px; font-weight: 750; fill: #f7fbff; }
      .small-copy { font-size: 14px; fill: #aebdd0; }
      .flow { font-size: 13px; font-weight: 650; fill: #c9d7e8; }
      .pill { font-size: 13px; font-weight: 650; fill: #cbd8e8; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#background)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <ellipse cx="1040" cy="505" rx="760" ry="520" fill="url(#glowBlue)"/>
  <path d="M0 145H1920" stroke="#2a3b55" stroke-opacity="0.65"/>
  <path d="M50 690H1870" stroke="#2a3b55" stroke-opacity="0.65" stroke-dasharray="5 9"/>

  <g class="font">
    <text x="64" y="77" class="title">本地 Agent 智能体实训系统</text>
    <text x="66" y="112" class="subtitle">MODULAR AGENT ARCHITECTURE · B1–B5 · TRACEABLE DATA FLOW</text>
    <rect x="1600" y="53" width="252" height="48" rx="24" fill="#0e223b" stroke="#31567d"/>
    <circle cx="1630" cy="77" r="7" fill="#22c55e" filter="url(#softGlow)"/>
    <text x="1650" y="83" font-size="15" font-weight="700" fill="#dce9f8">React + FastAPI · Local First</text>

    <text x="64" y="179" class="band">01 / 交互入口</text>
    <text x="64" y="375" class="band">02 / 智能编排与状态</text>
    <text x="64" y="727" class="band">03 / 工具执行与运行产物</text>

