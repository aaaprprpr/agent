      <rect x="1640" y="180" width="230" height="240" rx="24" fill="#0e1b2c" stroke="#5f7188" stroke-width="1.5"/>
    </g>
    <text x="1310" y="219" class="module-id" fill="#fbbf24">B4 · LLM BRIDGE</text>
    <text x="1310" y="257" class="module-title">Agent LLM 决策</text>
    <rect x="1454" y="203" width="96" height="31" rx="15" fill="#92400e"/>
