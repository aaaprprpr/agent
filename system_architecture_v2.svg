      <text x="799" y="255" class="flow" text-anchor="middle">Runtime</text>
      <rect x="1196" y="245" width="84" height="25" rx="12" fill="#0b1b2e" stroke="#254867"/>
      <text x="1238" y="262" class="flow" text-anchor="middle">AIMessage</text>
      <rect x="1196" y="513" width="79" height="25" rx="12" fill="#15162d" stroke="#54478f"/>
