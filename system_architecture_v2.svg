    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M220 275H270" stroke="#7dd3fc" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M490 275H540" stroke="#7dd3fc" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M760 275H830" stroke="#7dd3fc" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M1190 290H1280" stroke="#7dd3fc" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M1580 290H1640" stroke="#fbbf24" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M1190 415H1235V590H1280" stroke="#c4b5fd" stroke-width="3" marker-start="url(#arrowViolet)" marker-end="url(#arrowViolet)"/>
      <path d="M1580 590H1640" stroke="#c4b5fd" stroke-width="3" marker-start="url(#arrowViolet)" marker-end="url(#arrowViolet)"/>
      <path d="M1430 480V420" stroke="#c4b5fd" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrowViolet)"/>
      <path d="M1010 480V720" stroke="#7dd3fc" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M1190 830H1280" stroke="#86efac" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M1580 835H1640" stroke="#86efac" stroke-width="3" marker-start="url(#arrowCyan)" marker-end="url(#arrowCyan)"/>
      <path d="M900 480V610H500V740" stroke="#93a4bd" stroke-width="2.5" marker-end="url(#arrowSlate)"/>
      <path d="M330 835H260V340H650" stroke="#93a4bd" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrowSlate)"/>
    </g>

