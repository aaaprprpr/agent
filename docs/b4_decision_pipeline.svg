<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">B4 Agent LLM 决策与协议转换链路</title>
  <desc id="desc">展示 messages、tools schema 与模型配置如何经过提示构造、统一模型适配、原始输出解析和标准校验，生成 AIMessage 或阶段 JSON。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf5"/><stop offset="1" stop-color="#f7f9ff"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a34"/><stop offset="1" stop-color="#d94f08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172554" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#27366b"/>
    </marker>
    <style>
      .t{font-family:'Microsoft YaHei','Noto Sans CJK SC',sans-serif;fill:#172554}.h{font-weight:700}.muted{fill:#5b647b}.white{fill:#fff}.box{fill:#fff;stroke:#d7dceb;stroke-width:2}.step{fill:#fff;stroke:#ef6c21;stroke-width:2.5}.pill{fill:#fff3e8;stroke:#ff9a58;stroke-width:1.5}.small{font-size:20px}.body{font-size:22px}.label{font-size:19px;font-weight:700;letter-spacing:.06em}.num{font-size:22px;font-weight:700;fill:#fff}.mono{font-family:Consolas,'SFMono-Regular',monospace}
    </style>
  </defs>
  <rect width="1600" height="920" fill="url(#bg)"/>
  <text class="t h" x="80" y="82" font-size="44">B4 Agent LLM 决策与协议转换链路</text>
  <text class="t muted" x="80" y="120" font-size="22">统一多模型通信差异，把不稳定生成文本转换为可校验、可追踪的标准协议</text>
  <rect x="1240" y="48" width="280" height="78" rx="18" fill="url(#orange)" filter="url(#shadow)"/>
  <text class="t h white" x="1380" y="82" font-size="22" text-anchor="middle">负责人：王玺尊</text>
  <text class="t white" x="1380" y="108" font-size="18" text-anchor="middle">code/b4_local_agent_llm.py</text>

  <text class="t label" x="80" y="187">输入协议</text>
  <g filter="url(#shadow)">
    <rect class="box" x="70" y="210" width="260" height="100" rx="18"/>
    <rect class="box" x="70" y="330" width="260" height="100" rx="18"/>
    <rect class="box" x="70" y="450" width="260" height="100" rx="18"/>
    <rect class="box" x="70" y="570" width="260" height="100" rx="18"/>
  </g>
  <text class="t h body" x="100" y="250">messages</text><text class="t muted small" x="100" y="281">System / Human / AI / Tool</text>
  <text class="t h body" x="100" y="370">tools_schema</text><text class="t muted small" x="100" y="401">名称、参数、返回结构</text>
  <text class="t h body" x="100" y="490">model.yaml</text><text class="t muted small" x="100" y="521">来源、生成参数、token 上限</text>
  <text class="t h body" x="100" y="610">调用上下文</text><text class="t muted" x="100" y="641" font-size="17">mode · images · prompt_ready</text>

  <path d="M350 440H405" stroke="#27366b" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect class="step" x="420" y="225" width="250" height="430" rx="24"/>
  </g>
  <circle cx="455" cy="265" r="22" fill="url(#orange)"/><text class="t num" x="455" y="273" text-anchor="middle">1</text>
  <text class="t h" x="490" y="273" font-size="26">准备与约束</text>
  <text class="t small" x="455" y="325">• 配置路径解析与校验</text>
  <text class="t small" x="455" y="365">• 标准消息序列校验</text>
  <text class="t small" x="455" y="405">• 工具结构精简注入</text>
  <text class="t small" x="455" y="445">• JSON 输出协议约束</text>
  <text class="t small" x="455" y="485">• 阶段 Prompt 透传</text>
  <rect class="pill" x="455" y="535" width="180" height="48" rx="24"/>
  <text class="t h small" x="545" y="566" text-anchor="middle">prompt_messages</text>

  <path d="M690 440H745" stroke="#27366b" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect class="step" x="760" y="225" width="330" height="430" rx="24"/></g>
  <circle cx="795" cy="265" r="22" fill="url(#orange)"/><text class="t num" x="795" y="273" text-anchor="middle">2</text>
  <text class="t h" x="830" y="273" font-size="26">统一模型适配</text>
  <text class="t muted small" x="795" y="315">runtime.llm_source 手动切换</text>
  <rect class="pill" x="795" y="350" width="260" height="58" rx="18"/>
  <text class="t h body" x="925" y="386" text-anchor="middle">local / Transformers</text>
  <rect class="pill" x="795" y="425" width="260" height="58" rx="18"/>
  <text class="t h body" x="925" y="461" text-anchor="middle">FastAPI 模型服务</text>
  <rect class="pill" x="795" y="500" width="260" height="58" rx="18"/>
  <text class="t h body" x="925" y="536" text-anchor="middle">Qwen API 代理</text>
  <text class="t muted small" x="795" y="608">/generate · /generate_stream</text>

  <path d="M1110 440H1165" stroke="#27366b" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect class="step" x="1180" y="190" width="340" height="500" rx="24"/></g>
  <circle cx="1218" cy="232" r="22" fill="url(#orange)"/><text class="t num" x="1218" y="240" text-anchor="middle">3</text>
  <text class="t h" x="1255" y="240" font-size="26">解析、校验与输出</text>
  <text class="t small" x="1218" y="300">• 保存 raw_text，不丢失失败证据</text>
  <text class="t small" x="1218" y="340">• 仅修复语义确定的结构别名</text>
  <text class="t small" x="1218" y="380">• arguments / parameters → args</text>
  <text class="t small" x="1218" y="420">• content、tool_calls、control 归一化</text>
  <text class="t small" x="1218" y="460">• validate_ai_message() 最终校验</text>
  <rect x="1218" y="505" width="264" height="62" rx="18" fill="#fff3e8" stroke="#ef6c21" stroke-width="2"/>
  <text class="t h body" x="1350" y="542" text-anchor="middle">标准 AIMessage</text>
  <rect x="1218" y="585" width="264" height="62" rx="18" fill="#f1f5ff" stroke="#5367b1" stroke-width="2"/>
  <text class="t h body" x="1350" y="622" text-anchor="middle">阶段 JSON Object</text>

  <rect x="70" y="735" width="1020" height="105" rx="22" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="t label" x="105" y="775">可观察产物</text>
  <text class="t small mono" x="105" y="811">raw_model_output.json · ai_message.json · llm_run_log.jsonl · prompt_messages</text>
  <rect x="1125" y="735" width="395" height="105" rx="22" fill="#fff5f2" stroke="#ef6c21" stroke-width="2"/>
  <text class="t h body" x="1322" y="774" text-anchor="middle">职责边界</text>
  <text class="t small" x="1322" y="810" text-anchor="middle">不执行 Skill · 不控制 Agent Loop · 不写 Memory</text>
  <text class="t muted" x="80" y="885" font-size="18">图：依据当前仓库 B4 源码与 configs/model.yaml 绘制；模型语义决策由模型完成，协议可靠性由程序校验。</text>
</svg>
