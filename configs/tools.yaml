default_toolset: basic_tools

settings:
  data_root: ../data
  default_workspace_root: data
  workspace_roots:
    data: ../data
    outputs: ../outputs
    memory: ../memory
    prompts: ../prompts
    configs: ../configs
    code: ../code
    skills: ../skills
  retry:
    max_attempts: 2
    recoverable_errors: [OSError, TimeoutError, ConnectionError]
  cache:
    enabled: true
    cacheable_tools: [calculator, file_reader, local_file_search, table_analyzer]

toolsets:
  basic_tools:
    - calculator
    - current_time
    - file_reader
    - file_writer
    - mcp_web_search
    - local_file_search
    - table_analyzer
    - format_converter
  mcp_tools:
    - mcp_web_search

tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: 计算安全的算术表达式。
    parameters:
      expression:
        type: string
        description: 由数字和支持的运算符组成的算术表达式。
    required: [expression]
    returns:
      result:
        type: number
        description: 计算结果。

  current_time:
    module: skills.current_time
    function: current_time
    description: 获取当前本地时间、协调世界时或指定时区时间。用户询问当前日期或时间时使用。
    parameters:
      timezone:
        type: string
        description: 可选时区名称，例如本地、协调世界时、亚洲上海，或类似 +08:00 的固定偏移。
    required: []
    returns:
      timezone: {type: string, description: 解析后的时区标签。}
      iso: {type: string, description: 当前时间的标准时间格式。}
      date: {type: string, description: 当前日期。}
      time: {type: string, description: 当前钟表时间。}
      weekday: {type: string, description: 星期名称。}
      utc_offset: {type: string, description: 协调世界时偏移，格式为正负小时分钟。}
      utc_time: {type: string, description: 当前协调世界时。}

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: 从允许的工作区根目录读取本地文本类文件或办公文档。支持常见文本、表格文本、配置、脚本、日志、文档和演示文件。路径默认相对于数据目录；需要访问其他根目录时使用别名路径。
    parameters:
      path:
        type: string
        description: 相对于数据目录的路径，或允许工作区根目录下的别名路径。
      max_chars:
        type: integer
        description: 最多返回的字符数。
      start_line:
        type: integer
        description: 可选起始行号，从 1 开始，用于部分读取。
      end_line:
        type: integer
        description: 可选结束行号，从 1 开始，用于部分读取。
    required: [path]
    returns:
      content: {type: string, description: 文件内容。}
      num_chars: {type: integer, description: 返回的字符数。}
      source: {type: string, description: 规范化后的路径；如果不在数据目录下，会包含根目录别名。}
      root_alias: {type: string, description: 匹配到的允许根目录别名。}
      line_count: {type: integer, description: 文件总行数。}
      parser: {type: string, description: 使用的解析器。}
      document_type: {type: string, description: 文档类型。}
      slide_count: {type: integer, description: 演示文件的页数；仅适用时返回。}
      truncated: {type: boolean, description: 内容是否被截断。}

  file_writer:
    module: skills.file_writer
    function: file_writer
    side_effects: true
    description: >-
      Write a new real file into this run's generated_files output directory.
      Use this when the user asks to create, generate, or write a file/document
      with a concrete type or suffix, including txt/.txt, md/.md/markdown,
      docx/.docx/Word, or supported code files such as .py, .js, .ts, .tsx,
      .html, .css, .java, .cpp, .c, .h, .cs, .go, .rs, .sql, .sh, or .ps1.
      Language-named code file requests such as Python, JavaScript, C, C++,
      Java, Go, Rust, SQL, Shell, or PowerShell code files also use this tool.
      Never use it to modify existing project files, and do not answer with
      only inline file content when a real file is requested.
    parameters:
      filename:
        type: string
        description: Relative output filename with a supported suffix, such as report.md or hello_world.c. Absolute paths and parent-directory segments are rejected.
      file_type:
        type: string
        description: One of txt, markdown, docx, or code. The filename suffix must match the selected file_type.
      content:
        type: string
        description: Complete file content to write.
    required: [filename, file_type, content]
    returns:
      generated_file_path: {type: string, description: Absolute path of the generated file.}
      relative_output_path: {type: string, description: "Path relative to the run output directory, under generated_files/."}
      filename: {type: string, description: Final generated filename after uniqueness handling.}
      file_type: {type: string, description: Normalized file type.}
      suffix: {type: string, description: File suffix used for validation.}
      num_chars: {type: integer, description: Number of input content characters.}
      num_bytes: {type: integer, description: Size of the generated file in bytes.}
      overwritten: {type: boolean, description: Always false because file_writer never overwrites existing files.}

  file_writer:
    module: skills.file_writer
    function: file_writer
    side_effects: true
    description: >-
      Write a new real file into this run's generated_files output directory.
      Use this when the user asks to create, generate, or write a file/document
      with a concrete type or suffix, including txt/.txt, md/.md/markdown,
      docx/.docx/Word, or supported code files such as .py, .js, .ts, .tsx,
      .html, .css, .java, .cpp, .c, .h, .cs, .go, .rs, .sql, .sh, or .ps1.
      Language-named code file requests such as Python, JavaScript, C, C++,
      Java, Go, Rust, SQL, Shell, or PowerShell code files also use this tool.
      Never use it to modify existing project files, and do not answer with
      only inline file content when a real file is requested.
    parameters:
      filename:
        type: string
        description: Relative output filename with a supported suffix, such as report.md or hello_world.c. Absolute paths and parent-directory segments are rejected.
      file_type:
        type: string
        description: One of txt, markdown, docx, or code. The filename suffix must match the selected file_type.
      content:
        type: string
        description: Complete file content to write.
    required: [filename, file_type, content]
    returns:
      generated_file_path: {type: string, description: Absolute path of the generated file.}
      relative_output_path: {type: string, description: "Path relative to the run output directory, under generated_files/."}
      filename: {type: string, description: Final generated filename after uniqueness handling.}
      file_type: {type: string, description: Normalized file type.}
      suffix: {type: string, description: File suffix used for validation.}
      num_chars: {type: integer, description: Number of input content characters.}
      num_bytes: {type: integer, description: Size of the generated file in bytes.}
      overwritten: {type: boolean, description: Always false because file_writer never overwrites existing files.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: 在允许的工作区根目录下搜索本地文本类文件。此工具只用于本地项目文件，不能用于网页、互联网、实时新闻或当前外部信息。
    parameters:
      query: {type: string, description: 搜索关键词。}
      root_dir: {type: string, description: 相对于数据目录的目录，或允许工作区根目录下的别名路径。}
      file_types:
        type: array
        items: {type: string}
        description: 需要搜索的文件扩展名。
      top_k: {type: integer, description: 最多返回的匹配数量。}
      max_file_chars: {type: integer, description: 每个文件最多扫描的字符数。}
    required: [query]
    returns:
      results: {type: array, description: 按相关度排序的路径、片段和分数。}

  mcp_web_search:
    module: skills.mcp_web_search
    function: mcp_web_search
    description: 通过已配置的搜索服务进行网页搜索。用于互联网搜索、实时新闻、近期事件、当前外部信息，或本地文件中没有的主题。
    parameters:
      query: {type: string, description: 网页搜索关键词。}
      top_k: {type: integer, description: 请求的最大结果数量。}
    required: [query]
    returns:
      query: {type: string, description: 原始搜索关键词。}
      top_k: {type: integer, description: 请求的结果数量。}
      mcp_config: {type: string, description: 使用的搜索服务配置文件。}
      mcp_tool_name: {type: string, description: 实际调用的搜索工具名称。}
      mcp_arguments: {type: object, description: 发送给成功或最终搜索尝试的参数。}
      mcp_attempt_count: {type: integer, description: 搜索尝试次数。}
      mcp_attempts: {type: array, description: 已尝试的搜索调用，包括回退尝试和错误文本。}
      structured_content: {type: object, description: 搜索服务返回的结构化内容；存在时返回。}
      text: {type: string, description: 搜索服务返回的文本内容。}
      is_error: {type: boolean, description: 搜索工具是否报告错误。}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: 分析本地表格文本文件。
    parameters:
      path: {type: string, description: 相对于数据目录的表格路径，或允许工作区根目录下的别名路径。}
      max_rows_preview: {type: integer, description: 预览行数。}
      describe: {type: boolean, description: 是否计算数值统计信息。}
    required: [path]
    returns:
      num_rows: {type: integer, description: 数据行数。}
      num_columns: {type: integer, description: 列数。}
      columns: {type: array, description: 列名。}
      preview: {type: array, description: 前几行预览。}
      column_profiles: {type: object, description: 按列统计的缺失值和唯一值信息。}
      describe: {type: object, description: 按列统计的数值信息。}

  format_converter:
    module: skills.format_converter
    function: format_converter
    side_effects: true
    description: 将文本转换为项目符号列表或格式化结构，并把转换后的内容写入文件。
    parameters:
      text: {type: string, description: 输入文本。}
      target_format: {type: string, description: 目标格式。}
      output_filename: {type: string, description: 可选输出文件名；默认使用转换结果文件名。}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: 转换后的文本。}
      generated_file_path: {type: string, description: 生成的输出文件路径。}
