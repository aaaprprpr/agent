memory:
  root_dir: ../memory
  global_memory_dir: global
  conversation_memory_dir: conversations
  index_path: memory_index.json
  max_memory_chars: 2000
  retrieval:
    mode: keyword_top_k
    top_k: 5
    per_doc_chars: 1200
    field_weights:
      title: 5
      summary: 3
      final_answer: 4
      user_messages: 4
      content: 1
    auto_select:
      enabled: true
      memory_types: [global, conversation]
      min_score: 2
      max_candidates: 50
