runtime:
  default_mode: prompt_json
  # local: B4 进程自己加载模型；fastapi: B4 通过 HTTP 调用服务器常驻模型进程
  llm_source: fastapi

model:
  backend: transformers
  # 相对 configs/model.yaml 解析；服务器当前模型目录是 assignment_B/Qwen3.5-4B
  model_name_or_path: ../../Qwen3.5-4B
  tokenizer_name_or_path: ../../Qwen3.5-4B
  model_loader: auto
  local_files_only: true
  trust_remote_code: true
  torch_dtype: bfloat16
  device_map: auto

generation:
  max_new_tokens: 1024
  do_sample: false
  temperature: 0
  top_p: 1

context:
  max_input_tokens: 4096

tool_calling:
  mode: prompt_json

fastapi:
  base_url: http://127.0.0.1:8012
  generate_path: /generate
  timeout_seconds: 600
  api_key: null
  model: null

outputs:
  save_raw_output: true
  save_ai_message: true
  save_prompt_text: true
